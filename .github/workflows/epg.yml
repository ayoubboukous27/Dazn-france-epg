name: Update EPG DAZN France

on:
  schedule:
    - cron: '0 0 * * *'  # تشغيل يوميًا الساعة 00:00 UTC
  workflow_dispatch: # لتشغيل يدوي

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ Install dependencies
      - name: Install requests
        run: |
          python -m pip install --upgrade pip
          python -m pip install requests

      # 4️⃣ Run the EPG script
      - name: Run EPG script
        run: python epg_dazn_multi.py

      # 5️⃣ Commit & push epg.xml باستخدام write
      - name: Commit and push EPG
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "action@github.com"
          git add epg.xml
          git commit -m "Update DAZN France EPG $(date -u '+%Y-%m-%d')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
