name: Update EPG DAZN France Serie A

on:
  schedule:
    # تشغيل يوميًا الساعة 00:00 UTC
    - cron: '0 0 * * *'
  workflow_dispatch: # يمكن تشغيله يدوياً من GitHub

jobs:
  update-epg:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ استنساخ الريبو
      - name: Checkout repository
        uses: actions/checkout@v3

      # 2️⃣ تثبيت Python
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      # 3️⃣ تثبيت requests (مطلوب للسحب من Football-Data.org)
      - name: Install dependencies
        run: python -m pip install --upgrade pip requests

      # 4️⃣ تشغيل السكريبت
      - name: Run EPG script
        run: python epg_dazn_fr.py

      # 5️⃣ Commit و Push التحديثات
      - name: Commit and push EPG
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "action@github.com"
          git add epg.xml
          git commit -m "Update DAZN France EPG $(date -u '+%Y-%m-%d')" || echo "No changes to commit"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
